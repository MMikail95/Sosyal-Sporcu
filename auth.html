<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş Yap — Sosyal Sporcu</title>
  <meta name="description" content="Sosyal Sporcu'ya giriş yap veya hesap oluştur. Halısahanın sosyal ağı.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neon-green: #adff2f;
      --neon-cyan:  #00e5ff;
      --neon-pink:  #ff007f;
      --bg-dark:    #0a0a0f;
      --glass:      rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.08);
      --text:       #f0f0f0;
      --text-muted: #888;
      --error:      #ff4d4d;
      --success:    #adff2f;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Animasyonlu arka plan ── */
    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: orbFloat 12s ease-in-out infinite;
    }
    .bg-orb:nth-child(1) { width: 500px; height: 500px; background: var(--neon-green); top: -150px; left: -150px; animation-delay: 0s; }
    .bg-orb:nth-child(2) { width: 400px; height: 400px; background: var(--neon-cyan);  top: 60%;   right: -120px; animation-delay: 4s; }
    .bg-orb:nth-child(3) { width: 350px; height: 350px; background: var(--neon-pink);  bottom: -100px; left: 40%; animation-delay: 8s; }

    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    /* Yüzen top ikonları */
    .floating-balls {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .float-icon {
      position: absolute;
      font-size: 1.2rem;
      opacity: 0.06;
      animation: floatUp 15s linear infinite;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(30px, -20px) scale(1.05); }
      66%       { transform: translate(-20px, 15px) scale(0.97); }
    }
    @keyframes floatUp {
      0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.06; }
      90%  { opacity: 0.06; }
      100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
    }

    /* ── Ana kart ── */
    .auth-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      margin: 1rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 25px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
      animation: cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Logo header ── */
    .auth-header {
      text-align: center;
      padding: 2.5rem 2.5rem 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .auth-logo {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1rem;
    }
    .auth-logo i { font-size: 1.8rem; color: var(--neon-green); }
    .auth-logo span {
      font-size: 1.4rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--neon-green), var(--neon-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }

    .auth-tagline {
      font-size: 0.85rem;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    /* ── Tab geçişi ── */
    .auth-tabs {
      display: flex;
      margin: 0;
    }

    .auth-tab-btn {
      flex: 1;
      padding: 1rem;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      letter-spacing: 0.5px;
    }
    .auth-tab-btn.active {
      color: var(--neon-green);
      border-bottom-color: var(--neon-green);
    }
    .auth-tab-btn:hover:not(.active) { color: var(--text); }

    /* ── Form panel ── */
    .auth-panel {
      display: none;
      padding: 2rem 2.5rem 2.5rem;
      animation: fadeIn 0.3s ease both;
    }
    .auth-panel.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Form alanları ── */
    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    /* Sadece doğrudan çocuk olan sol ikon (kilit) için */
    .input-wrapper > i {
      position: absolute;
      left: 1rem;
      color: var(--text-muted);
      font-size: 0.9rem;
      pointer-events: none;
      transition: color 0.2s;
    }

    .auth-input {
      width: 100%;
      padding: 0.85rem 1rem 0.85rem 2.8rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      transition: all 0.25s ease;
      outline: none;
    }
    /* Şifre alanı sağda buton için padding */
    .auth-input[type="password"],
    .auth-input.has-toggle {
      padding-right: 3rem;
    }
    .auth-input:focus {
      border-color: var(--neon-green);
      background: rgba(173,255,47,0.04);
      box-shadow: 0 0 0 3px rgba(173,255,47,0.08);
    }
    .auth-input:focus + i,
    .input-wrapper:focus-within i { color: var(--neon-green); }
    .auth-input::placeholder { color: #444; }

    /* Şifre göster/gizle butonu */
    .toggle-pass {
      position: absolute;
      right: 0.6rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 0.4rem 0.5rem;
      transition: color 0.2s;
      z-index: 10;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
    }
    .toggle-pass:hover { color: var(--neon-green); }
    /* Buton içindeki ikon tıklanabilir olmalı */
    .toggle-pass i { pointer-events: none; }

    /* Hata mesajı */
    .form-error {
      font-size: 0.78rem;
      color: var(--error);
      margin-top: 0.4rem;
      display: none;
    }
    .form-error.show { display: block; }

    /* ── Submit butonu ── */
    .btn-auth {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--neon-green), #6fff00);
      color: #0a0a0f;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
      letter-spacing: 0.5px;
    }
    .btn-auth:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(173,255,47,0.35);
    }
    .btn-auth:active:not(:disabled) { transform: translateY(0); }
    .btn-auth:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .btn-auth .spinner { display: none; }
    .btn-auth.loading .btn-text { display: none; }
    .btn-auth.loading .spinner { display: inline-block; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Divider ── */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.25rem 0;
    }
    .auth-divider span { flex: 1; height: 1px; background: rgba(255,255,255,0.06); }
    .auth-divider p { font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; }

    /* ── Şifremi unuttum ── */
    .forgot-link {
      text-align: right;
      margin-top: -0.5rem;
      margin-bottom: 1rem;
    }
    .forgot-link a {
      font-size: 0.78rem;
      color: var(--neon-cyan);
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .forgot-link a:hover { opacity: 0.7; }

    /* ── Geçiş linki ── */
    .auth-switch {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .auth-switch button {
      background: none;
      border: none;
      color: var(--neon-green);
      font-family: inherit;
      font-size: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .auth-switch button:hover { opacity: 0.7; }

    /* ── Global mesaj (üstte) ── */
    .auth-message {
      margin: 0 2.5rem 0;
      padding: 0.8rem 1rem;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .auth-message.error { background: rgba(255,77,77,0.1); border: 1px solid rgba(255,77,77,0.3); color: var(--error); display: flex; align-items: center; gap: 0.5rem; }
    .auth-message.success { background: rgba(173,255,47,0.08); border: 1px solid rgba(173,255,47,0.3); color: var(--neon-green); display: flex; align-items: center; gap: 0.5rem; }

    /* ── Şifre güçlendirici ── */
    .password-strength {
      display: flex;
      gap: 4px;
      margin-top: 0.5rem;
    }
    .strength-bar {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: rgba(255,255,255,0.08);
      transition: background 0.3s ease;
    }
    .strength-bar.weak   { background: var(--error); }
    .strength-bar.medium { background: orange; }
    .strength-bar.strong { background: var(--neon-green); }

    /* ── Onboarding panel (kayıt sonrası) ── */
    #panel-onboarding {
      padding: 2rem 2.5rem 2.5rem;
      animation: fadeIn 0.3s ease both;
    }
    .onboarding-title {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .onboarding-title h2 { font-size: 1.4rem; font-weight: 800; color: var(--neon-green); }
    .onboarding-title p  { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.3rem; }

    .position-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.6rem;
      margin-bottom: 1.25rem;
    }
    .pos-btn {
      padding: 0.75rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
    }
    .pos-btn:hover { border-color: rgba(173,255,47,0.3); color: var(--text); }
    .pos-btn.selected { border-color: var(--neon-green); background: rgba(173,255,47,0.08); color: var(--neon-green); }

    /* ── Loading overlay ── */
    #auth-loading {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: var(--bg-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
    }
    #auth-loading .load-ball {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(255,255,255,0.06);
      border-top-color: var(--neon-green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #auth-loading p { color: var(--text-muted); font-size: 0.9rem; }

    @media (max-width: 480px) {
      .auth-card { margin: 0.5rem; border-radius: 20px; }
      .auth-header { padding: 2rem 1.5rem 1.25rem; }
      .auth-panel { padding: 1.5rem; }
    }
  </style>
</head>
<body>

<!-- Loading overlay (oturum kontrol edilirken) -->
<div id="auth-loading">
  <div class="load-ball"></div>
  <p>Yükleniyor...</p>
</div>

<!-- Animasyonlu arka plan -->
<div class="bg-canvas">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-grid"></div>
  <div class="floating-balls" id="floating-balls"></div>
</div>

<!-- Auth Kart -->
<div class="auth-card" id="auth-card" style="display:none;">

  <!-- Header / Logo -->
  <div class="auth-header">
    <div class="auth-logo">
      <i class="fa-solid fa-futbol fa-spin" style="animation-duration:4s;"></i>
      <span>SOSYAL SPORCU</span>
    </div>
    <p class="auth-tagline">⚽ Halısahanın Sosyal Ağı</p>
  </div>

  <!-- Tab navigasyon -->
  <div class="auth-tabs" id="auth-tabs">
    <button class="auth-tab-btn active" id="tab-giris-btn" onclick="switchAuthTab('giris')">
      <i class="fa-solid fa-right-to-bracket"></i> Giriş Yap
    </button>
    <button class="auth-tab-btn" id="tab-kayit-btn" onclick="switchAuthTab('kayit')">
      <i class="fa-solid fa-user-plus"></i> Hesap Oluştur
    </button>
  </div>

  <!-- Global mesaj alanı -->
  <div class="auth-message" id="auth-message"></div>

  <!-- ==============================
       PANEL: GİRİŞ
  ============================== -->
  <div class="auth-panel active" id="panel-giris">
    <form id="form-giris" onsubmit="handleLogin(event)">

      <div class="form-group">
        <label class="form-label">E-posta Adresi</label>
        <div class="input-wrapper">
          <input type="email" id="login-email" class="auth-input"
                 placeholder="ornek@email.com" autocomplete="email" required>
          <i class="fa-solid fa-envelope"></i>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Şifre</label>
        <div class="input-wrapper">
          <input type="password" id="login-password" class="auth-input has-toggle"
                 placeholder="••••••••" autocomplete="current-password" required>
          <i class="fa-solid fa-lock"></i>
          <button type="button" class="toggle-pass" onclick="togglePassword('login-password', this)" title="Şifreyi göster/gizle">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>
      </div>

      <div class="forgot-link">
        <a href="#" onclick="handleForgotPassword(event)">Şifremi Unuttum</a>
      </div>

      <button type="submit" class="btn-auth" id="btn-login">
        <i class="fa-solid fa-spinner spinner"></i>
        <span class="btn-text"><i class="fa-solid fa-right-to-bracket"></i> GİRİŞ YAP</span>
      </button>

    </form>

    <div class="auth-switch">
      Hesabın yok mu?
      <button onclick="switchAuthTab('kayit')">Kayıt Ol →</button>
    </div>
  </div>

  <!-- ==============================
       PANEL: KAYIT
  ============================== -->
  <div class="auth-panel" id="panel-kayit">
    <form id="form-kayit" onsubmit="handleRegister(event)">

      <div class="form-group">
        <label class="form-label">Kullanıcı Adı</label>
        <div class="input-wrapper">
          <input type="text" id="reg-username" class="auth-input"
                 placeholder="mikimon" autocomplete="username"
                 pattern="[a-zA-Z0-9_]+" minlength="3" maxlength="20" required
                 oninput="checkUsernameAvailability(this.value)">
          <i class="fa-solid fa-at"></i>
          <span id="username-check" style="position:absolute; right:1rem; font-size:0.8rem;"></span>
        </div>
        <div class="form-error" id="err-username">Sadece harf, rakam ve _ kullanılabilir (min. 3 karakter)</div>
      </div>

      <div class="form-group">
        <label class="form-label">Ad Soyad</label>
        <div class="input-wrapper">
          <input type="text" id="reg-fullname" class="auth-input"
                 placeholder="Mehmet Yılmaz" autocomplete="name" required minlength="2">
          <i class="fa-solid fa-id-card"></i>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">E-posta Adresi</label>
        <div class="input-wrapper">
          <input type="email" id="reg-email" class="auth-input"
                 placeholder="ornek@email.com" autocomplete="email" required>
          <i class="fa-solid fa-envelope"></i>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Şifre</label>
        <div class="input-wrapper">
          <input type="password" id="reg-password" class="auth-input has-toggle"
                 placeholder="En az 6 karakter" autocomplete="new-password"
                 required minlength="6"
                 oninput="updatePasswordStrength(this.value)">
          <i class="fa-solid fa-lock"></i>
          <button type="button" class="toggle-pass" onclick="togglePassword('reg-password', this)" title="Şifreyi göster/gizle">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>
        <div class="password-strength">
          <div class="strength-bar" id="str-1"></div>
          <div class="strength-bar" id="str-2"></div>
          <div class="strength-bar" id="str-3"></div>
          <div class="strength-bar" id="str-4"></div>
        </div>
      </div>

      <button type="submit" class="btn-auth" id="btn-register">
        <i class="fa-solid fa-spinner spinner"></i>
        <span class="btn-text"><i class="fa-solid fa-user-plus"></i> HESAP OLUŞTUR</span>
      </button>

    </form>

    <div class="auth-switch">
      Zaten hesabın var mı?
      <button onclick="switchAuthTab('giris')">Giriş Yap →</button>
    </div>
  </div>

  <!-- ==============================
       PANEL: ONBOARDING (kayıt sonrası)
  ============================== -->
  <div id="panel-onboarding" style="display:none;">
    <div class="onboarding-title">
      <h2>🎉 Hoş Geldin!</h2>
      <p>Sahada hangi mevkide oynuyorsun?</p>
    </div>

    <div class="position-grid" id="pos-grid">
      <button class="pos-btn" onclick="selectPosition('KL', this)">🧤 Kaleci</button>
      <button class="pos-btn" onclick="selectPosition('DEF', this)">🛡️ Defans</button>
      <button class="pos-btn" onclick="selectPosition('OS', this)">⚡ Orta Saha</button>
      <button class="pos-btn" onclick="selectPosition('FV', this)">⚽ Forvet</button>
    </div>

    <div class="form-group">
      <label class="form-label">Şehir</label>
      <div class="input-wrapper">
        <input type="text" id="onb-city" class="auth-input" placeholder="İstanbul" list="city-list">
        <i class="fa-solid fa-location-dot"></i>
      </div>
      <datalist id="city-list">
        <option value="İstanbul"><option value="Ankara"><option value="İzmir">
        <option value="Bursa"><option value="Antalya"><option value="Adana">
        <option value="Konya"><option value="Gaziantep"><option value="Kocaeli">
      </datalist>
    </div>

    <button class="btn-auth" onclick="completeOnboarding()">
      <span class="btn-text"><i class="fa-solid fa-futbol"></i> SAHAYA ÇIK!</span>
    </button>
  </div>

</div><!-- /auth-card -->

<script src="auth.js"></script>
<script>
  // Yüzen toplar oluştur
  (function createFloatingBalls() {
    const container = document.getElementById('floating-balls');
    const icons = ['fa-futbol', 'fa-trophy', 'fa-medal', 'fa-shield-halved', 'fa-star'];
    for (let i = 0; i < 12; i++) {
      const el = document.createElement('i');
      el.className = `fa-solid ${icons[i % icons.length]} float-icon`;
      el.style.left = Math.random() * 100 + '%';
      el.style.animationDelay = Math.random() * 15 + 's';
      el.style.animationDuration = (10 + Math.random() * 10) + 's';
      el.style.fontSize = (0.8 + Math.random() * 1.5) + 'rem';
      container.appendChild(el);
    }
  })();
</script>

</body>
</html>
